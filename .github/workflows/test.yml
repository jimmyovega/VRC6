name: Test

# Runs unit + integration tests on every PR. The integration tests use
# @cloudflare/vitest-pool-workers, which runs D1 locally via Miniflare —
# no Cloudflare credentials required.
on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
